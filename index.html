<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>English App</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 40px;
    }
    textarea {
      width: 80%;
      height: 100px;
      margin: 20px;
      padding: 10px;
    }
    button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Aprende Inglés con IA 🚀</h1>

  <textarea id="text" placeholder="Escribe en inglés..."></textarea><br>

  <button onclick="sendText()">Corregir</button>

  <div id="result"></div>

  <script>
    async function sendText() {
      const text = document.getElementById("text").value;

      const res = await fetch("/ai", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      document.getElementById("result").innerText = data.result || "Error";
    }
  </script>

</body>
</html>
