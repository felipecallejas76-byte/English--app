<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>English AI</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      color: white;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(0,0,0,0.2);
      padding: 30px;
      border-radius: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
      border: none;
      margin-top: 20px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Aprende Inglés con IA 🚀</h1>

    <textarea id="text" placeholder="Escribe en inglés..."></textarea>

    <button onclick="sendText()">Corregir</button>

    <div id="result">Aquí aparecerá la corrección</div>
  </div>

  <script>
    async function sendText() {
      const text = document.getElementById("text").value;

      const res = await fetch("/ai", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      document.getElementById("result").innerText = data.result;
    }
  </script>

</body>
</html>
